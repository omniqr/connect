<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniQR Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
        }
        .btn-blue {
            background: linear-gradient(135deg, #0A84FF, #0055FF);
            transition: transform 0.2s;
        }
        .btn-blue:active {
            transform: scale(0.95);
        }
        .social-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            transition: background 0.2s;
        }
        .social-card:hover {
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>
    <div id="content" class="w-full max-w-md p-6 hidden">
        <div class="glass p-8 text-center mb-6">
            <div class="w-20 h-20 bg-blue-500/10 rounded-3xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-qrcode text-4xl text-blue-500"></i>
            </div>
            <h1 id="bizName" class="text-3xl font-black mb-2">Business Name</h1>
            <p id="tagline" class="text-gray-500 font-medium">OmniQR Smart Connect</p>
        </div>

        <div id="wifiSection" class="glass p-6 mb-6 hidden">
            <h2 class="text-xs font-black text-gray-500 tracking-widest uppercase mb-4" id="wifiTitle">Wi-Fi Access</h2>
            <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl">
                <div class="flex items-center">
                    <i class="fas fa-wifi text-blue-500 mr-4"></i>
                    <div>
                        <p id="ssid" class="font-bold">SSID</p>
                        <p class="text-xs text-gray-400" id="wifiSub">Tap to copy password</p>
                    </div>
                </div>
                <button onclick="copyWifi()" class="w-12 h-12 rounded-xl bg-blue-500/20 flex items-center justify-center">
                    <i class="fas fa-copy text-blue-500"></i>
                </button>
            </div>
        </div>

        <div id="socialsSection" class="glass p-6">
            <h2 class="text-xs font-black text-gray-500 tracking-widest uppercase mb-4" id="socialsTitle">Channels</h2>
            <div id="socialList" class="space-y-3">
                <!-- Social buttons will be injected here -->
            </div>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-gray-600 text-xs">Powered by OmniQR Business</p>
        </footer>
    </div>

    <div id="loader" class="text-blue-500">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
    </div>

    <script>
        const TRANSLATIONS = {
            tr: { wifi: 'Wi-Fi Erişimi', socials: 'Kanallar', wifiSub: 'Şifreyi kopyalamak için dokun', copied: 'Şifre kopyalandı!' },
            en: { wifi: 'Wi-Fi Access', socials: 'Channels', wifiSub: 'Tap to copy password', copied: 'Password copied!' },
            de: { wifi: 'WLAN-Zugriff', socials: 'Kanäle', wifiSub: 'Passwort kopieren', copied: 'Passwort kopiert!' },
            fr: { wifi: 'Accès Wi-Fi', socials: 'Canaux', wifiSub: 'Copier le mot de passe', copied: 'Mot de passe copié!' },
            es: { wifi: 'Acceso Wi-Fi', socials: 'Canales', wifiSub: 'Copiar contraseña', copied: '¡Contraseña copiada!' }
        };

        const SOCIAL_CONFIG = {
            'Instagram': { icon: 'fa-brands fa-instagram', color: '#E4405F' },
            'Twitter': { icon: 'fa-brands fa-twitter', color: '#1DA1F2' },
            'TikTok': { icon: 'fa-brands fa-tiktok', color: '#fff' },
            'Facebook': { icon: 'fa-brands fa-facebook', color: '#1877F2' },
            'Web': { icon: 'fas fa-globe', color: '#0A84FF' }
        };

        let wifiPass = "";

        function decodeData() {
            const urlParams = new URLSearchParams(window.location.search);
            const d = urlParams.get('d');
            if (!d) return;

            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(d))));
                render(decoded);
            } catch (e) {
                console.error("Decoding failed", e);
            }
        }

        function render(data) {
            const lang = data.l || 'en';
            const t = TRANSLATIONS[lang] || TRANSLATIONS['en'];

            document.getElementById('bizName').innerText = data.n;
            document.getElementById('wifiTitle').innerText = t.wifi;
            document.getElementById('socialsTitle').innerText = t.socials;
            document.getElementById('wifiSub').innerText = t.wifiSub;

            if (data.wn) {
                document.getElementById('wifiSection').classList.remove('hidden');
                document.getElementById('ssid').innerText = data.wn;
                wifiPass = data.wp;
            }

            if (data.soc && data.soc.length > 0) {
                const list = document.getElementById('socialList');
                data.soc.forEach(s => {
                    const conf = SOCIAL_CONFIG[s.t] || { icon: 'fas fa-link', color: '#fff' };
                    let finalUrl = s.v;
                    
                    // Smart Link Formatting
                    if (!finalUrl.startsWith('http')) {
                        if (s.t === 'Instagram') finalUrl = `https://instagram.com/${finalUrl}`;
                        else if (s.t === 'Twitter') finalUrl = `https://x.com/${finalUrl}`;
                        else if (s.t === 'TikTok') finalUrl = `https://tiktok.com/@${finalUrl}`;
                        else if (s.t === 'Facebook') finalUrl = `https://facebook.com/${finalUrl}`;
                        else if (s.t === 'Web') finalUrl = `https://${finalUrl}`;
                    }

                    const card = document.createElement('a');
                    card.href = finalUrl;
                    card.target = "_blank";
                    card.className = "flex items-center p-4 social-card";
                    card.innerHTML = `
                        <i class="${conf.icon} text-xl mr-4" style="color: ${conf.color}"></i>
                        <span class="font-bold flex-1">${s.t}</span>
                        <i class="fas fa-chevron-right text-gray-600 text-xs"></i>
                    `;
                    list.appendChild(card);
                });
            }

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        function copyWifi() {
            navigator.clipboard.writeText(wifiPass).then(() => {
                alert(TRANSLATIONS[window.currentLang || 'en'].copied);
            });
        }

        decodeData();
    </script>
</body>
</html>
