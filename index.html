<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniQR Connect | Digital Business Card</title>
    <meta name="description" content="Securely share your contact details, social media, and Wi-Fi via OmniQR Business.">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="OmniQR Business Pro">
    <meta property="og:description" content="Digital Business Card & Contact Hub">
    <meta property="og:image" content="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/svgs/solid/qrcode.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0A84FF;
            --accent: #5E5CE6;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        /* Mesh Gradient Blobs */
        .bg-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            animation: blobMove 20s infinite alternate;
        }
        .blob-1 { background: var(--primary); top: -100px; left: -100px; }
        .blob-2 { background: var(--accent); bottom: -100px; right: -100px; animation-delay: -5s; }
        .blob-3 { background: #BF5AF2; top: 40%; left: 30%; width: 300px; height: 300px; animation-delay: -10s; }
        
        @keyframes blobMove {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.1); }
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            padding: 24px;
            z-index: 10;
        }
        .glass {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 40px;
            margin-bottom: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-blue {
            background: linear-gradient(135deg, var(--primary), #0055FF);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .btn-blue:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(10, 132, 255, 0.4); }
        .btn-blue::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 40%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.1) 60%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: shimmer 4s infinite linear;
        }
        @keyframes shimmer {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }
        .social-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            padding: 24px;
            margin-bottom: 14px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.03);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }
        .social-card:hover { 
            background: rgba(255, 255, 255, 0.08); 
            transform: scale(1.03) translateY(-4px);
            border-color: rgba(10, 132, 255, 0.2);
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.5);
        }
        .name-gradient {
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
    <div id="loader" class="flex items-center justify-center h-screen text-blue-500">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
    </div>

    <div id="content" class="main-container hidden">
        
        <!-- Premium Header -->
        <div class="glass p-10 text-center relative">
            <div class="absolute top-0 right-0 p-4 opacity-20">
                <i class="fas fa-gem text-blue-500"></i>
            </div>
            <div id="bizIcon" class="w-24 h-24 bg-blue-500/10 rounded-[30px] flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                <i class="fas fa-briefcase text-4xl text-blue-500"></i>
            </div>
            <h1 id="mainTitle" class="text-3xl font-black mb-1 name-gradient">OmniQR</h1>
            <p id="subTitle" class="text-gray-500 font-bold tracking-widest text-[9px] uppercase">Business Profile</p>
        </div>

        <!-- Unified Contact Card -->
        <div id="contactSection" class="glass hidden overflow-hidden">
            <div class="p-8">
                <h2 class="text-[9px] font-black text-blue-500 tracking-[0.3em] uppercase mb-6 opacity-80">Identity Card</h2>
                <div class="mb-8">
                     <p id="contactName" class="text-3xl font-black text-white mb-2"></p>
                     <p id="contactRole" class="text-gray-500 font-bold text-xs tracking-widest uppercase opacity-60"></p>
                </div>
                <div class="space-y-4 mb-8">
                    <div class="flex items-center gap-4">
                        <i class="fas fa-phone text-blue-500 w-5"></i>
                        <p id="contactPhone" class="text-lg font-bold text-white/90"></p>
                    </div>
                    <div class="flex items-center gap-4">
                        <i class="fas fa-envelope text-blue-500 w-5"></i>
                        <p id="contactEmail" class="text-sm font-medium text-gray-400"></p>
                    </div>
                </div>
                <button onclick="downloadVCard()" class="w-full h-16 btn-blue rounded-2xl font-black text-sm tracking-widest flex items-center justify-center">
                    <i class="fas fa-user-plus mr-3"></i> <span id="saveLabel">SAVE TO CONTACTS</span>
                </button>
            </div>
        </div>

        <!-- Professional WiFi Card -->
        <div id="wifiSection" class="glass hidden">
            <div class="p-8">
                <h2 class="text-[10px] font-black text-blue-500 tracking-[0.2em] uppercase mb-4">Guest Wi-Fi</h2>
                <div class="flex items-center justify-between bg-white/5 p-5 rounded-[24px] border border-white/5">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center mr-4">
                            <i class="fas fa-wifi text-blue-500"></i>
                        </div>
                        <div>
                            <p id="ssid" class="font-bold text-lg">Network</p>
                            <p class="text-[10px] text-gray-500 uppercase font-black" id="wifiHint">Tap to copy</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Social Hub -->
        <div id="socialsSection" class="hidden">
            <div class="px-2 mb-4">
                <h2 class="text-[10px] font-black text-blue-500 tracking-[0.2em] uppercase">Digital Channels</h2>
            </div>
            <div id="socialList"></div>
        </div>

        <!-- Professional Made With Badge -->
        <div class="flex flex-col items-center justify-center py-12 opacity-80 decoration-none">
            <a href="#" class="inline-flex items-center px-5 py-2.5 rounded-full glass border border-white/10 no-underline hover:bg-white/10 transition-all">
                <div class="w-6 h-6 bg-blue-500 rounded-lg flex items-center justify-center mr-3 shadow-lg shadow-blue-500/20">
                    <i class="fas fa-qrcode text-[10px] text-white"></i>
                </div>
                <span class="text-[11px] font-bold tracking-wide text-gray-300">Created with <span class="text-white">OmniQR Business</span></span>
            </a>
            <p class="text-[9px] font-black tracking-[0.4em] uppercase text-gray-600 mt-6">Secure Business Infrastructure</p>
        </div>
    </div>

    <script>
        const API_URL = "https://omniqr-analytics.omniqr-analytics-stats.workers.dev";
        let qrId = "unknown";

        function trackEvent(type, label = null) {
            if (!qrId || qrId === "unknown") return;
            fetch(`${API_URL}/track`, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ qr_id: qrId, event_type: type, event_label: label })
            }).catch(e => console.error("Track error", e));
        }

        const TRANSLATIONS = {
            tr: { save: 'REHBERE KAYDET', hint: 'Şifreyi kopyalamak için dokun', copied: 'Şifre kopyalandı!' },
            en: { save: 'SAVE TO CONTACTS', hint: 'Tap to copy password', copied: 'Password copied!' }
        };

        const SOCIAL_ICONS = {
            'Instagram': 'fa-brands fa-instagram',
            'Twitter': 'fa-brands fa-twitter',
            'TikTok': 'fa-brands fa-tiktok',
            'Facebook': 'fa-brands fa-facebook',
            'Web': 'fas fa-globe'
        };

        let wifiPass = "";
        let rawData = null;

        function init() {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            if (!d) return;
            try {
                // More robust base64 decoding for UTF-8
                const decoded = atob(d);
                const escaped = escape(decoded);
                const uriDecoded = decodeURIComponent(escaped);
                rawData = JSON.parse(uriDecoded);
                render(rawData);
            } catch (e) { 
                console.error("Decode fail", e);
                // Fallback decode if standard fails
                try {
                    rawData = JSON.parse(decodeURIComponent(escape(atob(d))));
                    render(rawData);
                } catch(err) { console.error("Critical decode fail"); }
            }
        }

        function render(data) {
            qrId = data.id || "legacy";
            trackEvent("visit");

            const lang = data.l || 'en';
            const t = TRANSLATIONS[lang] || TRANSLATIONS['en'];
            window.langCode = lang;

            // Header info
            document.getElementById('mainTitle').innerText = data.n || "OmniQR";
            
            // Identity Section
            if (data.fn || data.ln || data.ph || data.em) {
                document.getElementById('contactSection').classList.remove('hidden');
                document.getElementById('contactName').innerText = `${data.fn || ''} ${data.ln || ''}`.trim() || data.n || 'Contact';
                document.getElementById('contactRole').innerText = data.n || 'Business Partner';
                
                // Show/Hide phone
                if (data.ph) {
                    document.getElementById('contactPhone').parentElement.classList.remove('hidden');
                    document.getElementById('contactPhone').innerText = data.ph;
                } else {
                    document.getElementById('contactPhone').parentElement.classList.add('hidden');
                }

                // Show/Hide email
                if (data.em) {
                    document.getElementById('contactEmail').parentElement.classList.remove('hidden');
                    document.getElementById('contactEmail').innerText = data.em;
                } else {
                    document.getElementById('contactEmail').parentElement.classList.add('hidden');
                }
                
                document.getElementById('saveLabel').innerText = t.save;
            }

            // WiFi Section
            if (data.wn) {
                document.getElementById('wifiSection').classList.remove('hidden');
                document.getElementById('ssid').innerText = data.wn;
                document.getElementById('wifiHint').innerText = t.hint;
                wifiPass = data.wp;
            }

            // Socials Section
            if (data.soc && data.soc.length > 0) {
                document.getElementById('socialsSection').classList.remove('hidden');
                const list = document.getElementById('socialList');
                list.innerHTML = ""; 
                data.soc.forEach(s => {
                    const icon = SOCIAL_ICONS[s.t] || 'fas fa-link';
                    const url = s.v.startsWith('http') ? s.v : `https://${s.v}`;
                    const a = document.createElement('a');
                    a.className = "social-card";
                    a.href = url; a.target = "_blank";
                    a.onclick = () => trackEvent("click", s.t);
                    a.innerHTML = `<i class="${icon} text-2xl w-10 text-blue-500"></i><span class="font-black text-lg flex-1">${s.t}</span><i class="fas fa-chevron-right text-gray-700"></i>`;
                    list.appendChild(a);
                });
            }

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        function downloadVCard() {
            trackEvent("vcard");
            const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${rawData.fn || ''} ${rawData.ln || ''}\nTEL;TYPE=CELL:${rawData.ph || ''}\nEMAIL:${rawData.em || ''}\nORG:${rawData.n || ''}\nEND:VCARD`;
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${rawData.fn || 'Contact'}.vcf`;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
        }

        init();
    </script>
</body>
</html>
