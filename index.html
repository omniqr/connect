<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniQR Connect | Digital Business Card</title>
    <meta name="description" content="Securely share your contact details, social media, and Wi-Fi via OmniQR Business.">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="OmniQR Business Pro">
    <meta property="og:description" content="Digital Business Card & Contact Hub">
    <meta property="og:image" content="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/svgs/solid/qrcode.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .main-container {
            width: 100%;
            max-width: 450px;
            padding: 24px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .btn-blue {
            background: linear-gradient(135deg, #0A84FF, #0055FF);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px rgba(10, 132, 255, 0.3);
        }
        .btn-blue:active {
            transform: scale(0.96);
        }
        .social-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 12px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .social-card:hover { 
            background: rgba(255, 255, 255, 0.1); 
            transform: translateY(-2px);
        }
        .name-gradient {
            background: linear-gradient(to right, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="loader" class="flex items-center justify-center h-screen text-blue-500">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
    </div>

    <div id="content" class="main-container hidden">
        
        <!-- Premium Header -->
        <div class="glass p-10 text-center relative">
            <div class="absolute top-0 right-0 p-4 opacity-20">
                <i class="fas fa-gem text-blue-500"></i>
            </div>
            <div id="bizIcon" class="w-24 h-24 bg-blue-500/10 rounded-[30px] flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                <i class="fas fa-briefcase text-4xl text-blue-500"></i>
            </div>
            <h1 id="mainTitle" class="text-3xl font-black mb-1 name-gradient">OmniQR</h1>
            <p id="subTitle" class="text-gray-500 font-bold tracking-widest text-xs uppercase">Business Pro Hub</p>
        </div>

        <!-- Unified Contact Card -->
        <div id="contactSection" class="glass p-1 hidden">
            <div class="p-8">
                <h2 class="text-[10px] font-black text-blue-500 tracking-[0.2em] uppercase mb-6">Contact Passport</h2>
                <div class="space-y-1 mb-8">
                     <p id="contactPhone" class="text-3xl font-black text-white"></p>
                     <p id="contactEmail" class="text-gray-500 font-medium text-lg"></p>
                </div>
                <button onclick="downloadVCard()" class="w-full h-16 btn-blue rounded-2xl font-black text-lg flex items-center justify-center">
                    <i class="fas fa-user-plus mr-3"></i> <span id="saveLabel">SAVE TO CONTACTS</span>
                </button>
            </div>
        </div>

        <!-- Professional WiFi Card -->
        <div id="wifiSection" class="glass hidden">
            <div class="p-8">
                <h2 class="text-[10px] font-black text-blue-500 tracking-[0.2em] uppercase mb-4">Guest Wi-Fi</h2>
                <div class="flex items-center justify-between bg-white/5 p-5 rounded-[24px] border border-white/5">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center mr-4">
                            <i class="fas fa-wifi text-blue-500"></i>
                        </div>
                        <div>
                            <p id="ssid" class="font-bold text-lg">Network</p>
                            <p class="text-[10px] text-gray-500 uppercase font-black" id="wifiHint">Tap to copy</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Social Hub -->
        <div id="socialsSection" class="hidden">
            <div class="px-2 mb-4">
                <h2 class="text-[10px] font-black text-blue-500 tracking-[0.2em] uppercase">Digital Channels</h2>
            </div>
            <div id="socialList"></div>
        </div>

        <!-- Professional Made With Badge -->
        <div class="flex flex-col items-center justify-center py-12 opacity-80 decoration-none">
            <a href="#" class="inline-flex items-center px-5 py-2.5 rounded-full glass border border-white/10 no-underline hover:bg-white/10 transition-all">
                <div class="w-6 h-6 bg-blue-500 rounded-lg flex items-center justify-center mr-3 shadow-lg shadow-blue-500/20">
                    <i class="fas fa-qrcode text-[10px] text-white"></i>
                </div>
                <span class="text-[11px] font-bold tracking-wide text-gray-300">Created with <span class="text-white">OmniQR Business</span></span>
            </a>
            <p class="text-[9px] font-black tracking-[0.4em] uppercase text-gray-600 mt-6">Secure Business Infrastructure</p>
        </div>
    </div>

    <script>
        const API_URL = "https://omniqr-analytics.omniqr-analytics-stats.workers.dev";
        let qrId = "unknown";

        function trackEvent(type, label = null) {
            if (!qrId || qrId === "unknown") return;
            fetch(`${API_URL}/track`, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ qr_id: qrId, event_type: type, event_label: label })
            }).catch(e => console.error("Track error", e));
        }

        const TRANSLATIONS = {
            tr: { save: 'REHBERE KAYDET', hint: 'Şifreyi kopyalamak için dokun', copied: 'Şifre kopyalandı!' },
            en: { save: 'SAVE TO CONTACTS', hint: 'Tap to copy password', copied: 'Password copied!' }
        };

        const SOCIAL_ICONS = {
            'Instagram': 'fa-brands fa-instagram',
            'Twitter': 'fa-brands fa-twitter',
            'TikTok': 'fa-brands fa-tiktok',
            'Facebook': 'fa-brands fa-facebook',
            'Web': 'fas fa-globe'
        };

        let wifiPass = "";
        let rawData = null;

        function init() {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            if (!d) return;
            try {
                // More robust base64 decoding for UTF-8
                const decoded = atob(d);
                const escaped = escape(decoded);
                const uriDecoded = decodeURIComponent(escaped);
                rawData = JSON.parse(uriDecoded);
                render(rawData);
            } catch (e) { 
                console.error("Decode fail", e);
                // Fallback decode if standard fails
                try {
                    rawData = JSON.parse(decodeURIComponent(escape(atob(d))));
                    render(rawData);
                } catch(err) { console.error("Critical decode fail"); }
            }
        }

        function render(data) {
            qrId = data.id || "legacy";
            trackEvent("visit");

            const lang = data.l || 'en';
            const t = TRANSLATIONS[lang] || TRANSLATIONS['en'];
            window.langCode = lang;

            // Header info
            document.getElementById('mainTitle').innerText = data.n || "OmniQR";
            
            // vCard Section
            if (data.fn || data.ln || data.ph || data.em) {
                document.getElementById('contactSection').classList.remove('hidden');
                document.getElementById('contactPhone').innerText = data.ph || '';
                document.getElementById('contactEmail').innerText = data.em || '';
                document.getElementById('saveLabel').innerText = t.save;
            }

            // WiFi Section
            if (data.wn) {
                document.getElementById('wifiSection').classList.remove('hidden');
                document.getElementById('ssid').innerText = data.wn;
                document.getElementById('wifiHint').innerText = t.hint;
                wifiPass = data.wp;
            }

            // Socials Section
            if (data.soc && data.soc.length > 0) {
                document.getElementById('socialsSection').classList.remove('hidden');
                const list = document.getElementById('socialList');
                list.innerHTML = ""; 
                data.soc.forEach(s => {
                    const icon = SOCIAL_ICONS[s.t] || 'fas fa-link';
                    const url = s.v.startsWith('http') ? s.v : `https://${s.v}`;
                    const a = document.createElement('a');
                    a.className = "social-card";
                    a.href = url; a.target = "_blank";
                    a.onclick = () => trackEvent("click", s.t);
                    a.innerHTML = `<i class="${icon} text-2xl w-10 text-blue-500"></i><span class="font-black text-lg flex-1">${s.t}</span><i class="fas fa-chevron-right text-gray-700"></i>`;
                    list.appendChild(a);
                });
            }

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        function downloadVCard() {
            trackEvent("vcard");
            const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${rawData.fn || ''} ${rawData.ln || ''}\nTEL;TYPE=CELL:${rawData.ph || ''}\nEMAIL:${rawData.em || ''}\nORG:${rawData.n || ''}\nEND:VCARD`;
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${rawData.fn || 'Contact'}.vcf`;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
        }

        init();
    </script>
</body>
</html>
