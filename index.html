<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniQR Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #F3F4F6; color: #1F2937; font-family: 'Inter', sans-serif; }
        .premium-card { background: white; border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .social-btn { transition: transform 0.2s; }
        .social-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="content" class="w-full max-w-sm text-center">
        <div class="mb-8">
            <h1 id="biz-name" class="text-3xl font-black tracking-tight text-gray-900">Business Name</h1>
            <p id="welcome" class="text-gray-400 mt-2 font-medium italic"></p>
        </div>

        <div id="wifi-box" class="hidden premium-card p-6 mb-6 border border-white">
            <div class="bg-blue-50 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4 text-blue-500">
                <i class="fas fa-wifi text-2xl"></i>
            </div>
            <h3 id="wifi-label" class="text-[10px] uppercase font-bold tracking-[0.2em] text-gray-400 mb-1"></h3>
            <p id="wifi-ssid" class="text-xl font-black text-gray-800 mb-4"></p>
            <button onclick="copyWifi()" id="copy-btn" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold text-sm uppercase tracking-widest shadow-lg shadow-gray-200"></button>
            <p id="status" class="text-green-500 text-[10px] font-bold mt-2 opacity-0 transition-opacity">COPIED</p>
        </div>

        <div id="links" class="space-y-4"></div>

        <div class="mt-12 opacity-30">
            <p class="text-[10px] font-bold tracking-widest uppercase">Powered by OmniQR</p>
        </div>
    </div>

    <script>
        const i18n = {
            tr: { welcome: "Dijital Dünyamıza Hoş Geldiniz", wifi: "Misafir İnterneti", copy: "Şifreyi Kopyala", copied: "Şifre Kopyalandı", visit: "Ziyaret Et" },
            en: { welcome: "Welcome to our digital space", wifi: "Guest Wi-Fi", copy: "Copy Password", copied: "Password Copied", visit: "Visit Us" },
            de: { welcome: "Willkommen bei uns", wifi: "Gast Wi-Fi", copy: "Passwort Kopieren", copied: "Kopiert!", visit: "Besuchen" }
        };

        function getIcon(v) {
            v = v.toLowerCase();
            if(v.includes('instagram')) return 'fab fa-instagram';
            if(v.includes('twitter') || v.includes('x.com')) return 'fab fa-x-twitter';
            if(v.includes('tiktok')) return 'fab fa-tiktok';
            if(v.includes('facebook')) return 'fab fa-facebook';
            return 'fas fa-link';
        }

        const data = JSON.parse(atob(new URLSearchParams(window.location.search).get('d')));
        const dict = i18n[data.l || 'en'];

        document.getElementById('biz-name').innerText = data.n;
        document.getElementById('welcome').innerText = dict.welcome;

        if(data.wn) {
            document.getElementById('wifi-box').classList.remove('hidden');
            document.getElementById('wifi-label').innerText = dict.wifi;
            document.getElementById('wifi-ssid').innerText = data.wn;
            document.getElementById('copy-btn').innerText = dict.copy;
            window.wp = data.wp;
        }

        data.soc?.forEach(s => {
            const link = s.v.startsWith('http') ? s.v : `https://${s.v}`;
            document.getElementById('links').innerHTML += `
                <a href="${link}" target="_blank" class="premium-card p-5 flex items-center bg-white social-btn border border-gray-100">
                    <div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center mr-4 text-gray-800">
                        <i class="${getIcon(s.v)} text-xl"></i>
                    </div>
                    <span class="font-bold text-gray-700 flex-1 text-left">${dict.visit}</span>
                    <i class="fas fa-arrow-right text-gray-300 text-xs"></i>
                </a>`;
        });

        function copyWifi() {
            navigator.clipboard.writeText(window.wp);
            document.getElementById('status').classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => document.getElementById('status').classList.replace('opacity-100', 'opacity-0'), 2000);
        }
    </script>
</body>
</html>
