<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniQR Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .main-container {
            width: 100%;
            max-width: 450px;
            padding: 24px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            margin-bottom: 24px;
        }
        .btn-blue {
            background: linear-gradient(135deg, #0A84FF, #0055FF);
            transition: transform 0.2s;
        }
        .btn-blue:active {
            transform: scale(0.95);
        }
        .social-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            padding: 16px;
            margin-bottom: 12px;
            text-decoration: none;
            color: white;
        }
        .social-card:hover { background: rgba(255, 255, 255, 0.08); }
        .logo-box {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            margin: 0 auto 16px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-img { width: 100%; height: 100%; object-cover: cover; }
    </style>
</head>
<body>
    <div id="loader" class="flex items-center justify-center h-screen text-blue-500">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
    </div>

    <div id="content" class="main-container hidden">
        
        <!-- Header -->
        <div class="glass p-8 text-center">
            <div id="logoWrapper" class="logo-box hidden">
                <img id="logoImg" src="" class="logo-img">
            </div>
            <h1 id="mainTitle" class="text-3xl font-black mb-1">OmniQR</h1>
            <p id="subTitle" class="text-gray-500 font-medium">Business Hub</p>
        </div>

        <!-- Contact Section -->
        <div id="contactSection" class="glass p-8 hidden">
            <h2 class="text-xs font-black text-gray-500 tracking-widest uppercase mb-4">Contact</h2>
            <div class="text-center mb-6">
                 <p id="contactPhone" class="text-2xl font-black text-blue-500 mb-1"></p>
                 <p id="contactEmail" class="text-gray-400 font-medium"></p>
            </div>
            <button onclick="downloadVCard()" class="w-full h-16 btn-blue rounded-2xl font-black text-lg shadow-xl shadow-blue-500/20 flex items-center justify-center">
                <i class="fas fa-user-plus mr-3"></i> <span id="saveLabel">SAVE TO CONTACTS</span>
            </button>
        </div>

        <!-- WiFi Section -->
        <div id="wifiSection" class="glass p-6 hidden">
            <h2 class="text-xs font-black text-gray-500 tracking-widest uppercase mb-4">Wi-Fi</h2>
            <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl">
                <div class="flex items-center">
                    <i class="fas fa-wifi text-blue-500 mr-4"></i>
                    <div>
                        <p id="ssid" class="font-bold">Network Name</p>
                        <p class="text-[10px] text-gray-500 uppercase tracking-wider" id="wifiHint">Tap to copy password</p>
                    </div>
                </div>
                <button onclick="copyWifi()" class="w-12 h-12 rounded-xl bg-blue-500/20 flex items-center justify-center">
                    <i class="fas fa-copy text-blue-500"></i>
                </button>
            </div>
        </div>

        <!-- Social List -->
        <div id="socialsSection" class="glass p-6 hidden">
            <h2 class="text-xs font-black text-gray-500 tracking-widest uppercase mb-4">Links & Social</h2>
            <div id="socialList"></div>
        </div>

        <footer class="text-center py-6">
            <p class="text-gray-600 text-[10px] font-black tracking-widest uppercase">OmniQR Business Professional Edition</p>
        </footer>
    </div>

    <script>
        const TRANSLATIONS = {
            tr: { save: 'REHBERE KAYDET', hint: 'Şifreyi kopyalamak için dokun', copied: 'Şifre kopyalandı!' },
            en: { save: 'SAVE TO CONTACTS', hint: 'Tap to copy password', copied: 'Password copied!' }
        };

        const SOCIAL_ICONS = {
            'Instagram': 'fa-brands fa-instagram',
            'Twitter': 'fa-brands fa-twitter',
            'TikTok': 'fa-brands fa-tiktok',
            'Facebook': 'fa-brands fa-facebook',
            'Web': 'fas fa-globe'
        };

        let wifiPass = "";
        let rawData = null;

        function init() {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            if (!d) return;
            try {
                rawData = JSON.parse(decodeURIComponent(escape(atob(d))));
                render(rawData);
            } catch (e) { console.error(e); }
        }

        function render(data) {
            const lang = data.l || 'en';
            const t = TRANSLATIONS[lang] || TRANSLATIONS['en'];
            window.langCode = lang;

            // Header info
            document.getElementById('mainTitle').innerText = data.n;
            if (data.logo) {
                document.getElementById('logoWrapper').classList.remove('hidden');
                document.getElementById('logoImg').src = data.logo;
            }

            // Contact
            if (data.fn || data.ph) {
                document.getElementById('contactSection').classList.remove('hidden');
                document.getElementById('contactPhone').innerText = data.ph || '';
                document.getElementById('contactEmail').innerText = data.em || '';
                document.getElementById('saveLabel').innerText = t.save;
            }

            // WiFi
            if (data.wn) {
                document.getElementById('wifiSection').classList.remove('hidden');
                document.getElementById('ssid').innerText = data.wn;
                document.getElementById('wifiHint').innerText = t.hint;
                wifiPass = data.wp;
            }

            // Socials
            if (data.soc && data.soc.length > 0) {
                document.getElementById('socialsSection').classList.remove('hidden');
                const list = document.getElementById('socialList');
                data.soc.forEach(s => {
                    const icon = SOCIAL_ICONS[s.t] || 'fas fa-link';
                    const url = s.v.startsWith('http') ? s.v : `https://${s.v}`;
                    const a = document.createElement('a');
                    a.className = "social-card";
                    a.href = url; a.target = "_blank";
                    a.innerHTML = `<i class="${icon} text-xl w-8 text-blue-500"></i><span class="font-bold flex-1">${s.t}</span><i class="fas fa-arrow-right text-[10px] text-gray-700"></i>`;
                    list.appendChild(a);
                });
            }

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        function downloadVCard() {
            const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${rawData.fn} ${rawData.ln}\nTEL;TYPE=CELL:${rawData.ph}\nEMAIL:${rawData.em}\nORG:${rawData.n}\nEND:VCARD`;
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${rawData.fn}.vcf`;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
        }

        function copyWifi() {
            navigator.clipboard.writeText(wifiPass).then(() => {
                alert(TRANSLATIONS[window.langCode].copied);
            });
        }

        init();
    </script>
</body>
</html>
